<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Education abstract backdrop</title>
  <desc id="desc">Layered geometric planes representing growth.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162410"/>
      <stop offset="50%" stop-color="#365f2a"/>
      <stop offset="100%" stop-color="#88a55c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity="0.28">
    <polygon points="120,880 560,360 940,880" fill="#d2e2ad"/>
    <polygon points="520,900 900,420 1300,900" fill="#f2ebc8"/>
    <polygon points="920,920 1220,540 1500,920" fill="#b4cd84"/>
  </g>
  <line x1="220" y1="905" x2="1430" y2="905" stroke="#f4f0df" stroke-opacity="0.5" stroke-width="4"/>
</svg>
