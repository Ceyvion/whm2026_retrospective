<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Dance abstract backdrop</title>
  <desc id="desc">Warm rhythmic arcs and circles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26130f"/>
      <stop offset="45%" stop-color="#8b3429"/>
      <stop offset="100%" stop-color="#f0a04f"/>
