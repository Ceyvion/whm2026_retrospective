<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Benin abstract backdrop</title>
  <desc id="desc">Layered warm gradients and textured circles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f1e16"/>
      <stop offset="55%" stop-color="#8d4f3a"/>
      <stop offset="100%" stop-color="#d7b27a"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0.25" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#f3d9ab" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f3d9ab" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0.8" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#120f0d" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#120f0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="420" cy="280" r="380" fill="url(#orbA)"/>
  <circle cx="1260" cy="760" r="440" fill="url(#orbB)"/>
  <g opacity="0.1" fill="#f9f2e6">
    <circle cx="240" cy="840" r="6"/>
    <circle cx="320" cy="790" r="4"/>
    <circle cx="420" cy="860" r="5"/>
    <circle cx="1320" cy="160" r="5"/>
    <circle cx="1420" cy="220" r="4"/>
    <circle cx="1200" cy="280" r="6"/>
  </g>
</svg>
